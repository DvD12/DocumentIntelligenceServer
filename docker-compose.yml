services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DB_PATH: /srv/data/metadata.db
    volumes:
      - app_data:/srv/data
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
  app_data:
